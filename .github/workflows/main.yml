name: Phonk Reel Automation

on:
  workflow_dispatch: # Manual trigger

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ADD THIS STEP HERE
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Step 1 - Notion & Playlist Check
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python 1_Notion_check.py
        

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          # INSTALL RCLONE
          sudo -v && curl https://rclone.org/install.sh | sudo bash

      - name: ⚙️ Setup Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: 📥 Step 2 - Download & Cleanup Assets
        env:
          PIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          PIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
        run: |
          # 1. Create the remote exactly like your previous working code
          rclone config create mypikpak pikpak user "$PIKPAK_USER" pass "$PIKPAK_PASS"
          
          # 2. Verify it's working
          echo "🔍 Checking PikPak connection..."
          rclone lsf mypikpak: --max-depth 1
          
          # 3. Run the Python download script
          # Since rclone just created the config, the Python subprocess will now find 'mypikpak'
          python 2_download_video.py

      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🔉 Step 3.5 - Extract Best Part
        run: python 3.5_trim_audio.py

      - name: 🎬 Step 4 - Render Video
        run: |
          rm -rf output/
          mkdir -p output/
          bash 4_output.sh

      - name: 🚀 Step 5 - Webhook Upload
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          # Only runs if Step 4 succeeded
          bash 5_webhook.sh

      - name: 📦 Archive Final Video (Backup)
        if: always() # Still uploads to GitHub even if webhook fails
        uses: actions/upload-artifact@v4
        with:
          name: generated-reels
          path: output/

      - name: 📝 Commit and Push Metadata
        run: |
          # 1. Configure Git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. Stage the file
          git add metadata.json
          
          # 3. Commit only if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to metadata.json"
          else
            git commit -m "Update metadata.json for new track [skip ci]"
            git push
          fi
