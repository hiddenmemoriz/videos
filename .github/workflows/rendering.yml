name: Phonk Reel Automation

permissions:
  contents: write
  
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Stop the job if it hangs for more than 30 mins
    
    steps:
     

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          sudo -v && curl https://rclone.org/install.sh | sudo bash



      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🎬 Step 4 - Render Video
        run: |
          rm -rf output/
          mkdir -p output/
          bash 4_output.sh

      - name: 🚀 Step 5 - Webhook & Force Push Video
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: bash 5_webhook.sh

      - name: 📝 Step 6 - Update Notion Database
        if: success()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: python 6_notion_update.py

      - name: 🧹 Step 7 - Delete from YouTube Playlist
        if: success()
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
        run: python 7_cleanup_playlist.py

      - name: ☁️ Step 8 - Final PikPak Cloud Cleanup
        if: success()
        run: python 8_pikpak_cleanup.py
