name: PikPak Download to Git Test

on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  download-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo -v && curl https://rclone.org/install.sh | sudo bash

      - name: Configure PikPak
        env:
          PIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          PIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
        run: |
          rclone config create mypikpak pikpak user "$PIKPAK_USER" pass "$PIKPAK_PASS"
          rclone lsf mypikpak: --max-depth 1

      - name: Run Download Script
        run: python pikpak_full_test.py

      - name: Commit File to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add output/
          # Only commit if there are changes to avoid errors
          git diff --quiet && git diff --staged --quiet || git commit -m "Test: Downloaded video to output folder"
          git push
