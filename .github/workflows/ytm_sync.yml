name: Reels Logic - Notion Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Automatically checks every hour

jobs:
  check-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Check Logic
        id: logic
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python - <<EOF
          import os
          import requests
          import json
          import sys

          # Your specific Database ID from the screenshot
          NOTION_DB_ID = "31fb4e9c9ef68068b8edc379332d974f"

          def get_yt_token():
              url = "https://oauth2.googleapis.com/token"
              oauth_data = json.loads(os.environ['YTM_OAUTH_JSON'])
              payload = {
                  "client_id": os.environ['YTM_CLIENT_ID'],
                  "client_secret": os.environ['YTM_CLIENT_SECRET'],
                  "refresh_token": oauth_data['refresh_token'],
                  "grant_type": "refresh_token"
              }
              return requests.post(url, data=payload).json().get('access_token')

          def get_first_item(token):
              url = "https://www.googleapis.com/youtube/v3/playlistItems"
              params = {
                  "part": "snippet,contentDetails",
                  "playlistId": "PL8WGYt2fhenCJnBHFBKqw8SZl-oyO03Ur",
                  "maxResults": 1
              }
              headers = {"Authorization": f"Bearer {token}"}
              r = requests.get(url, params=params, headers=headers).json()
              return r.get('items', [])[0] if r.get('items') else None

          def check_notion(video_id):
              url = f"https://api.notion.com/v1/databases/{NOTION_DB_ID}/query"
              headers = {
                  "Authorization": f"Bearer {os.environ['NOTION_TOKEN']}",
                  "Notion-Version": "2022-06-28",
                  "Content-Type": "application/json"
              }
              # Filters by the 'Video ID' column seen in your log
              payload = {
                  "filter": {
                      "property": "Video ID",
                      "rich_text": {"equals": video_id}
                  }
              }
              res = requests.post(url, json=payload, headers=headers).json()
              return len(res.get("results", [])) > 0

          yt_token = get_yt_token()
          item = get_first_item(yt_token)

          if not item:
              print("Playlist is empty.")
              sys.exit(0)

          v_id = item['contentDetails']['videoId']
          item_id = item['id']
          title = item['snippet']['title']

          if check_notion(v_id):
              print(f"SKIPPING: {title} ({v_id}) is already in Notion.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("exists=true\n")
          else:
              print(f"PROCEEDING: {title} ({v_id}) is a new track!")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("exists=false\n")
                  f.write(f"video_id={v_id}\n")
                  f.write(f"item_id={item_id}\n")
                  f.write(f"title={title}\n")
          EOF

      - name: Process Reel
        if: steps.logic.outputs.exists == 'false'
        run: |
          echo "Start processing: ${{ steps.logic.outputs.title }}"
          echo "Video ID: ${{ steps.logic.outputs.video_id }}"
          # Trigger your next automation step here (e.g., Make.com Webhook)
